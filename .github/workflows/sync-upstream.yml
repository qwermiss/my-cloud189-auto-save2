name: Sync Upstream

on:
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨 2 点自动同步
  workflow_dispatch:  # 允许手动点击运行

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/ymting/my-cloud189-auto-save.git
          git fetch upstream

      - name: Merge upstream main
        run: |
          git checkout main
          git merge upstream/main --no-edit || true

      - name: Check for conflicts
        id: check-conflicts
        run: |
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "has_conflicts=true" >> $GITHUB_OUTPUT
            echo "conflict_files=$(git diff --name-only --diff-filter=U | tr '\n' ' ')" >> $GITHUB_OUTPUT
          else
            echo "has_conflicts=false" >> $GITHUB_OUTPUT
          fi

      - name: Resolve conflicts - keep our Dockerfile
        if: steps.check-conflicts.outputs.has_conflicts == 'true'
        run: |
          git checkout --ours Dockerfile || true
          git add Dockerfile || true

      - name: Resolve conflicts - keep our workflows
        if: steps.check-conflicts.outputs.has_conflicts == 'true'
        run: |
          git checkout --ours .github/workflows/ || true
          git add .github/workflows/ || true

      - name: Commit merge if needed
        if: steps.check-conflicts.outputs.has_conflicts == 'true'
        run: |
          git commit -m "Auto-sync upstream, keep custom Dockerfile and workflows" || true

      - name: Push to main
        run: git push origin main

      - name: Trigger ARMv7 build
        if: success()
        run: |
          echo "Sync completed, ARMv7 build workflow should trigger automatically"
